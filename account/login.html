<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your Biddr account to manage listings, place bids, and track your auctions.">
    <meta name="author" content="Biddr">

    <title>Login - Biddr</title>

    <!-- Google Fonts --> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Krona+One&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../src/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../src/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../src/favicon/favicon-16x16.png">
    <link rel="manifest" href="../src/favicon/site.webmanifest">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/output.css">

    <!-- JavaScript -->
     <script type="module" src="../scripts/auth/login.mjs"></script>
</head>


<body class="flex min-h-screen items-center justify-center bg-primary px-4 py-10">

    <div class="w-full max-w-md rounded-2xl bg-white px-6 py-8 shadow-xl transition hover:shadow-2xl sm:px-8 sm:py-10">

        <div class="flex justify-center mb-6">
            <img src="../src/logo/Logo-main.png" alt="Biddr Logo" class="w-40 h-auto">
        </div>

        <section class="mb-6 text-center">
            <h2 class="text-2xl font-semibold text-primary">Login</h2>
        </section>
        
        <div class="login-form-container">
            <form id="login-form" class="flex flex-col gap-4">

                <div class="flex flex-col gap-2">
                    <label for="email" class="text-primary font-medium">Email*</label>
                    <input 
                        name="email" 
                        id="email" 
                        type="email" 
                        placeholder="Email@stud.noroff.no" 
                        required
                        class="w-full rounded-lg border border-primary px-4 py-3 text-primary placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
 
                <div> 
                    <label for="password" class="text-primary font-medium">Password*</label>
                    <input 
                        name="password" 
                        id="password" 
                        type="password"
                        placeholder="Password" 
                        required 
                        class="w-full rounded-lg border border-primary px-4 py-3 text-primary placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <p class="text-primary text-sm"> * Required field</p>

                <button 
                    type="submit" 
                    class="mt-2 rounded-lg bg-primary px-4 py-3 text-white font-medium shadow-md transition duration-200 ease-in-out hover:opacity-90 hover:shadow-lg active:scale-95">Login</button>
            </form>
        </div>

        <section class="mt-6">
            <p class="text-primary text-sm">
                Don't have an account? Please click 
                <a href="register.html" class="font-semibold underline under-offset-2 transition ease-in-out duration-100 hover:opacity-80">here</a> to register.</p>
        </section>
    </div> 
    
</body>
</html>
